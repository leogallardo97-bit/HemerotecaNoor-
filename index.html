<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Archivo Noor — Hemeroteca histórica digital del proyecto Noor. Explora documentos, prensa y registros históricos de Al-Ándalus." />
  <title>Archivo Noor | Hemeroteca Histórica Digital</title>
  
  <!-- Favicon Noor (Gold Emblem) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23c9a84c'/><text x='16' y='22' font-family='serif' font-size='18' font-weight='bold' fill='%230d0d0d' text-anchor='middle'>N</text></svg>">


  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
          },
          colors: {
            parchment: { 50: '#fdf8f0', 100: '#f5e6c8', 200: '#e8c987', 300: '#d4a54a' },
            ink: { 900: '#0d0d0d', 800: '#1a1a1a', 700: '#2a2a2a', 600: '#3a3a3a', 500: '#5a5a5a' },
            gold: { DEFAULT: '#c9a84c', light: '#e8c870', dark: '#9a7a2e' },
            sepia: { light: '#f0e2cc', DEFAULT: '#b8956a', dark: '#6b4f2e' },
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-in-out',
            'slide-down': 'slideDown 0.3s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0', transform: 'translateY(8px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideDown: { '0%': { opacity: '0', transform: 'translateY(-10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- PDF.js para Visor Web Interactivo -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/viewer.css" />
  <link rel="stylesheet" href="css/explore.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="css/editorial.css" />
  <link rel="stylesheet" href="css/help.css" />
  
  <!-- Shepherd.js (Guided Tour) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shepherd.js@10.0.1/dist/css/shepherd.css"/>
  <script src="https://cdn.jsdelivr.net/npm/shepherd.js@10.0.1/dist/js/shepherd.min.js"></script>
</head>

<body class="bg-ink-900 text-gray-100 font-sans min-h-screen flex flex-col">

  <!-- ═══════════════════════════════════════════════════════
       COMPONENTE: Header Principal
  ══════════════════════════════════════════════════════════ -->
  <div id="app-header"></div>

  <!-- ═══════════════════════════════════════════════════════
       COMPONENTE: Barra de Taxonomía (Épocas / Temas)
  ══════════════════════════════════════════════════════════ -->
  <div id="app-taxonomy-nav"></div>

  <!-- ═══════════════════════════════════════════════════════
       COMPONENTE: Barra de Búsqueda Facetada
  ══════════════════════════════════════════════════════════ -->
  <div id="app-search-bar"></div>

  <!-- ═══════════════════════════════════════════════════════
       COMPONENTE: Exploración (Línea de Tiempo + Mapa)
  ══════════════════════════════════════════════════════════ -->
  <div id="app-explore"></div>

  <!-- ═══════════════════════════════════════════════════════
       COMPONENTE: Grid de Resultados + Panel de Filtros
  ══════════════════════════════════════════════════════════ -->
  <main id="app-main" class="flex-1">
    <div id="app-results-layout"></div>
  </main>

  <!-- ═══════════════════════════════════════════════════════
       COMPONENTE: Modal Visor de Documentos (Fase 2)
  ══════════════════════════════════════════════════════════ -->
  <div id="app-viewer-modal" class="hidden"></div>

  <!-- Panel de Notas de Investigación (Fase 4) -->
  <div id="app-research-panel"></div>

  <!-- Overlay de Artículo (Estilo RetroNews) -->
  <div id="article-overlay"></div>

  <!-- Admin Dashboard (Fase 4) — Ctrl+Shift+A para abrir -->
  <div id="app-admin"></div>

  <!-- ═══════════════════════════════════════════════════════
       COMPONENTE: Footer
  ══════════════════════════════════════════════════════════ -->
  <div id="app-footer">
      <div class="footer-status">
        <span class="status-dot"></span>
        <span class="status-text">Sincronizado con Google Drive (Vol. 2)</span>
      </div>
      <p>&copy; 2026 Archivo Noor — Hemeroteca Digital de Al-Ándalus</p>
  </div>

  <!-- Scripts Modulares (carga en orden) -->
  <script src="js/data/local-db.js?v=1.4"></script>
  <script src="js/data/schema.js?v=1.4"></script>
  <script src="js/config.js?v=1.4"></script>
  <script src="js/data/data_cache.js?v=1.4"></script>
  <script src="js/data/drive-connector.js?v=1.4"></script>
  <script src="js/data/mock-data.js?v=1.4"></script>
  <script src="js/data/geo-data.js?v=1.4"></script>
  <script src="js/core/db.js?v=1.4"></script>
  <script src="js/core/auth.js?v=1.4"></script>
  <script src="js/core/state.js?v=1.4"></script>
  <script src="js/components/header.js?v=1.4"></script>
  <script src="js/components/taxonomy-nav.js?v=1.4"></script>
  <script src="js/components/search-bar.js?v=1.4"></script>
  <script src="js/components/filters-panel.js?v=1.4"></script>
  <script src="js/components/results-grid.js?v=1.4"></script>
  <script src="js/components/footer.js?v=1.4"></script>
  <script src="js/components/viewer.js?v=1.4"></script>
  <script src="js/components/timeline.js?v=1.4"></script>
  <script src="js/components/map.js?v=1.4"></script>
  <script src="js/components/explore.js?v=1.4"></script>
  <script src="js/components/research-panel.js?v=1.4"></script>
  <script src="js/components/admin.js?v=1.4"></script>
  <script src="js/admin/batch-upload.js?v=1.4"></script>
  <script src="js/components/help-modal.js?v=1.4"></script>
  <script src="js/components/article-view.js?v=1.4"></script>
  <script src="js/components/tour.js?v=1.4"></script>
  <script src="js/core/router.js?v=1.4"></script>
  <script src="js/app.js?v=1.4"></script>

</body>
</html>
